name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Ebitengine dependencies
        run: sudo apt-get update && sudo apt-get install -y libc6-dev libglu1-mesa-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev libasound2-dev pkg-config xvfb
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # ebiten を import するパッケージ(internal/render 等)は、ディスプレイの
      # ないヘッドレス環境ではパッケージ初期化(GLFW)の時点で panic するため、
      # Ebitengine 公式 CI と同様に xvfb(仮想ディスプレイ)経由で実行する。
      - name: Test
        run: xvfb-run go test ./...
